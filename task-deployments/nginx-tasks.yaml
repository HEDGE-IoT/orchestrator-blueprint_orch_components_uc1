# Four mock IoT task workloads — nginx pods tagged for the hedge-iot scheduler.
#
# Each pod template carries:
#   Labels:
#     schedulingStrategy: meetup      — required for the scheduler to watch this pod
#     schedulerName (spec)            — binds it to my-scheduler
#     hedge-iot/task-type             — human-readable task class
#   Annotations (hedge-iot/* prefix):
#     cycles-req   — CPU cycles the task needs
#     input-size   — input data in bytes         
#     output-size  — output data in bytes        
#     exe-size     — executable payload in bytes 
#     deadline     — relative deadline in ms     
#     ccr          — communication-to-computation ratio 
#     data-source  — IoT sensor type          
#   Container resources.requests mirror the above so kube can schedule properly.

---
# Task 0 — temperature monitor (communication-dominated, relaxed deadline)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-temperature-monitor
  namespace: default
  labels:
    hedge-iot/task-type: temperature-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-temperature-monitor
  template:
    metadata:
      labels:
        app: task-temperature-monitor
        schedulingStrategy: meetup
        serviceName: temperature-monitor
        hedge-iot/task-type: temperature-monitor
      annotations:
        hedge-iot/cycles-req: "178565"
        hedge-iot/input-size: "6634"
        hedge-iot/output-size: "4728"
        hedge-iot/exe-size: "32462"
        hedge-iot/deadline: "8838"
        hedge-iot/ccr: "4.52"
        hedge-iot/data-source: "temperature"
    spec:
      schedulerName: my-scheduler
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80

